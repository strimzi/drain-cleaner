name: Release

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: 'Release Version (e.g., 1.5.0 for GA or 1.5.0-rc1 for RC)'
        required: true
        type: string
      useSuffix:
        description: 'Build suffixed images (e.g., 1.5.0-0 before final 1.5.0)'
        required: true
        type: boolean
        default: true
      releaseSuffix:
        description: 'Release Suffix (e.g., 0 for 1.5.0-0, used only if useSuffix is true)'
        required: true
        type: string
        default: '0'
      sourceBuildRunId:
        description: 'GitHub Actions Run ID of the source build (find in Actions tab URL)'
        required: true
        type: string

# Declare default permissions as read only
permissions:
  contents: read

jobs:
  prepare-release-artifacts:
    name: Prepare Release Artifacts
    if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/setup-java@v1
        with:
          javaVersion: "21"

      - uses: strimzi/github-actions/.github/actions/dependencies/install-helm@v1
        with:
          helmVersion: "v3.16.0"

      - uses: strimzi/github-actions/.github/actions/build/release-artifacts@v1
        with:
          releaseVersion: ${{ inputs.releaseVersion }}
          artifactSuffix: "drain-cleaner"

  # Push Java artifacts to GHCR for long-term storage (for CVE rebuilds)
  push-java-artifacts-to-ghcr:
    name: Push Java artifacts to GHCR
    if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Download strimzi binaries from source build
        uses: actions/download-artifact@v7
        with:
          name: drain-cleaner-binaries.tar
          run-id: ${{ inputs.sourceBuildRunId }}
          github-token: ${{ github.token }}

      - name: Login to GHCR
        run: echo "${{ github.token }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Java artifacts to GHCR
        run: |
          oras push ghcr.io/${{ env.REPOSITORY }}/drain-cleaner-binaries:${{ env.TAG }} drain-cleaner-binaries.tar:application/x-tar
        env:
          TAG: ${{ inputs.releaseVersion }}-${{ inputs.sourceBuildRunId }}
          REPOSITORY: "strimzi"

  push-containers-with-suffix:
    name: Push Containers with suffix
    needs:
      - prepare-release-artifacts
    if: ${{ startsWith(github.ref, 'refs/heads/release-') && inputs.useSuffix == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/install-docker@v1

      - uses: strimzi/github-actions/.github/actions/dependencies/install-syft@v1

      - uses: strimzi/github-actions/.github/actions/build/push-containers@v1
        with:
          architectures: "amd64,arm64,ppc64le,s390x"
          containerRegistry: "quay.io"
          containerOrg: "strimzi"
          containerTag: "${{ inputs.releaseVersion }}-${{ inputs.releaseSuffix }}"
          registryUser: ${{ secrets.QUAY_USER }}
          registryPassword: ${{ secrets.QUAY_PASS }}
          artifactSuffix: "drain-cleaner"
          buildRunId: ${{ inputs.sourceBuildRunId }}

  push-containers:
    name: Push Containers without suffix (${{ inputs.releaseVersion }})
    needs:
      - push-containers-with-suffix
      - prepare-release-artifacts
    if: |-
      ${{ always() && startsWith(github.ref, 'refs/heads/release-') &&
        needs.prepare-release-artifacts.result == 'success' &&
        (needs.push-containers-with-suffix.result == 'success' ||
        needs.push-containers-with-suffix.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/install-docker@v1

      - uses: strimzi/github-actions/.github/actions/dependencies/install-syft@v1

      - uses: strimzi/github-actions/.github/actions/build/push-containers@v1
        with:
          architectures: "amd64,arm64,ppc64le,s390x"
          containerRegistry: "quay.io"
          containerOrg: "strimzi"
          containerTag: ${{ inputs.releaseVersion }}
          registryUser: ${{ secrets.QUAY_USER }}
          registryPassword: ${{ secrets.QUAY_PASS }}
          artifactSuffix: "drain-cleaner"
          buildRunId: ${{ inputs.sourceBuildRunId }}

  publish-helm-chart:
    name: Publish Helm Chart
    needs:
      - prepare-release-artifacts
      - push-containers
    if: |-
      ${{ always() && startsWith(github.ref, 'refs/heads/release-') &&
        needs.push-containers.result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: strimzi/github-actions/.github/actions/dependencies/install-helm@v1
        with:
          helmVersion: "v3.16.0"

      - name: Publish Helm charts using publish-helm action
        uses: strimzi/github-actions/.github/actions/build/publish-helm-chart@v1
        with:
          registryUser: ${{ secrets.QUAY_HELM_USER }}
          registryPassword: ${{ secrets.QUAY_HELM_PASS }}
          containerRegistry: "quay.io"
          containerOrg: "strimzi-helm"
          helmChartName: "strimzi-drain-cleaner-helm-3-chart"
          releaseVersion: ${{ inputs.releaseVersion }}
          artifactSuffix: "drain-cleaner"
