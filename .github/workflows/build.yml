name: Build

on:
  push:
    branches:
      - "main"
      - "release-*"
  pull_request:
    branches:
      - "*"

# Declare default permissions as read only
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-drain-cleaner:
    name: Build Drain Cleaner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java and Maven
        uses: strimzi/github-actions/.github/actions/dependencies/setup-java@v1
        with:
          javaVersion: ${{ matrix.java.version }}

      - name: Build binaries using build-binaries action
        uses: strimzi/github-actions/.github/actions/build/build-binaries@v1
        with:
          mainJavaBuild: ${{ matrix.java.mainBuild }}
          artifactSuffix: "kafka-bridge"
          clusterOperatorBuild: "false"
        env:
          MVN_ARGS: "-B -Dquarkus.native.container-build=true"

  build-containers:
    name: Build Containers
    needs:
      - build-drain-cleaner
    strategy:
      matrix:
        architecture:
          - amd64
          - arm64
          - s390x
          - ppc64le
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/install-docker@v1

      - uses: strimzi/github-actions/.github/actions/build/build-containers@v1
        with:
          architecture: ${{ matrix.architecture }}
          artifactSuffix: "drain-cleaner"
          containerRegistry: "quay.io"
          containerOrg: "strimzi"
          containerTag: "latest"
          imagesDir: "drain-cleaner-container-amd64.tar.gz"

  run-systemtests:
    name: Run System Tests
    needs:
      - build-containers
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            installType: Bundle
            runner: ubuntu-latest
          - architecture: amd64
            installType: Helm
            runner: ubuntu-latest
          - architecture: arm64
            installType: Bundle
            runner: oracle-vm-4cpu-16gb-arm64
          - architecture: arm64
            installType: Helm
            runner: oracle-vm-4cpu-16gb-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build/run-systemtests
        with:
          architecture: ${{ matrix.architecture }}
          runnerArch: ${{ matrix.architecture }}
          installType: ${{ matrix.installType }}

  push-containers:
    name: Push Containers
    needs:
      - build-drain-cleaner
      - build-containers
      - run-systemtests
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: strimzi/github-actions/.github/actions/dependencies/install-docker@v1

      - uses: strimzi/github-actions/.github/actions/dependencies/install-syft@v1

      - uses: strimzi/github-actions/.github/actions/build/push-containers@v1
        with:
          architectures: "amd64,arm64,ppc64le,s390x"
          containerRegistry: "quay.io"
          containerOrg: "strimzi"
          containerTag: "latest"
          registryUser: ${{ secrets.QUAY_USER }}
          registryPassword: ${{ secrets.QUAY_PASS }}
          artifactSuffix: "drain-cleaner"